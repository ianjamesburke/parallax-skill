name: Skill update reminder

on:
  repository_dispatch:
    types: [parallax-release]

permissions:
  issues: write

jobs:
  open-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Open reminder issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.client_payload.version }}
          CHANGELOG: ${{ github.event.client_payload.changelog }}
        run: |
          gh issue create \
            --repo ianjamesburke/parallax-skill \
            --title "New parallax release $VERSION — review SKILL.md" \
            --body "## parallax $VERSION released

Review SKILL.md for any commands, flags, or behavior that changed.

## Changelog
$CHANGELOG"
